amcl:
  ros__parameters:
    use_sim_time: false

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    base_frame_id: "robot2/base_footprint"
    odom_frame_id: "robot2/odom"
    global_frame_id: "map"

    update_min_a: 0.0
    update_min_d: 0.0

    robot_model_type: "nav2_amcl::OmniMotionModel"

    scan_topic: /robot2/scan
    laser_model_type: "likelihood_field"
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    z_short: 0.05
    z_max: 0.05
    lambda_short: 0.1

    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    random_seed: -1

    tf_broadcast: true
    transform_tolerance: 1.0
    set_initial_pose: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: /home/hs/trash/odom_revise_cap/my_map.yaml
