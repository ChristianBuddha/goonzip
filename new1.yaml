  # ===============================
  # Map Server
  # ===============================
  map_server:
    ros__parameters:
      use_sim_time: false
      yaml_filename: /home/hs/odom_revise_cap/ffo2.yaml

  map_saver:
    ros__parameters:
      use_sim_time: false
      save_map_timeout: 5.0
      free_thresh_default: 0.25
      occupied_thresh_default: 0.65
      map_subscribe_transient_local: true

  # ===============================
  # AMCL
  # ===============================
  amcl:
    ros__parameters:
      use_sim_time: false

      alpha1: 0.1
      alpha2: 0.1
      alpha3: 0.1
      alpha4: 0.1
      alpha5: 0.1

      base_frame_id: "base_link"
      odom_frame_id: "odom"
      global_frame_id: "map"

      robot_model_type: "nav2_amcl::OmniMotionModel"

      scan_topic: /scan
      laser_model_type: "likelihood_field"
      max_beams: 60
      laser_likelihood_max_dist: 2.0
      laser_max_range: 12.0
      laser_min_range: -1.0

      sigma_hit: 0.2
      lambda_short: 0.1

      # ✅ z_* 합 1.0으로 정리
      z_hit: 0.6
      z_rand: 0.3
      z_short: 0.05
      z_max: 0.05

      min_particles: 500
      max_particles: 2000
      pf_err: 0.05
      pf_z: 0.99
      resample_interval: 1

      recovery_alpha_fast: 0.0
      recovery_alpha_slow: 0.0

      update_min_d: 0.1
      update_min_a: 0.2

      do_beamskip: false
      beam_skip_distance: 0.5
      beam_skip_threshold: 0.3
      beam_skip_error_threshold: 0.9

      tf_broadcast: true
      transform_tolerance: 1.0
      save_pose_rate: 0.5

  # ===============================
  # BT Navigator
  # ===============================
  bt_navigator:
    ros__parameters:
      use_sim_time: false

      global_frame: map
      robot_base_frame: base_link
      odom_topic: /odom

      bt_loop_duration: 10
      transform_tolerance: 0.2
      filter_duration: 0.3

      default_server_timeout: 20
      wait_for_service_timeout: 1000
      default_cancel_timeout: 50

      introspection_mode: "disabled"
      enable_groot_monitoring: false
      always_reload_bt_xml: false

      goal_blackboard_id: goal
      goals_blackboard_id: goals
      path_blackboard_id: path
      waypoint_statuses_blackboard_id: waypoint_statuses

      navigators: ["navigate_to_pose", "navigate_through_poses"]

      navigate_to_pose:
        plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
        enable_groot_monitoring: false
        groot_server_port: 1667
        search_window: 2.0

      navigate_through_poses:
        plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
        enable_groot_monitoring: false
        groot_server_port: 1669
        search_window: 2.0

      error_code_name_prefixes:
        - assisted_teleop
        - backup
        - compute_path
        - dock_robot
        - drive_on_heading
        - follow_path
        - nav_thru_poses
        - nav_to_pose
        - spin
        - route
        - undock_robot
        - wait

  bt_navigator_navigate_through_poses_rclcpp_node:
    ros__parameters:
      use_sim_time: false

  bt_navigator_navigate_to_pose_rclcpp_node:
    ros__parameters:
      use_sim_time: false

  # ===============================
  # Planner Server
  # ===============================
  planner_server:
    ros__parameters:
      use_sim_time: false
      expected_planner_frequency: 10.0
      planner_plugins: ["GridBased"]

      GridBased:
        plugin: "nav2_navfn_planner::NavfnPlanner"
        tolerance: 0.5
        use_astar: true
        allow_unknown: true

  smoother_server:
    ros__parameters:
      use_sim_time: false
      smoother_plugins: ["simple_smoother"]
      simple_smoother:
        plugin: "nav2_smoother::SimpleSmoother"
        tolerance: 1.0e-10
        max_its: 1000
        do_refinement: true

  behavior_server:
    ros__parameters:
      use_sim_time: false
      costmap_topic: local_costmap/costmap_raw
      footprint_topic: local_costmap/published_footprint
      cycle_frequency: 10.0
      behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
      spin:
        plugin: "nav2_behaviors::Spin"
      backup:
        plugin: "nav2_behaviors::BackUp"
      drive_on_heading:
        plugin: "nav2_behaviors::DriveOnHeading"
      assisted_teleop:
        plugin: "nav2_behaviors::AssistedTeleop"
      wait:
        plugin: "nav2_behaviors::Wait"
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.1
      simulate_ahead_time: 2.0
      max_rotational_vel: 1.0
      min_rotational_vel: 0.2
      rotational_acc_lim: 1.0

  # ===============================
  # Controller Server
  # ===============================
  controller_server:
    ros__parameters:
      use_sim_time: false

      controller_frequency: 50.0
      costmap_update_timeout: 0.3

      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.001
      min_theta_velocity_threshold: 0.001

      failure_tolerance: 0.3

      odom_topic: /odom
      odom_duration: 0.3

      progress_checker_plugin: "progress_checker"
      goal_checker_plugins: ["goal_checker"]
      controller_plugins: ["FollowPath"]

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0

      goal_checker:
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.25
        yaw_goal_tolerance: 0.25
        stateful: true

      FollowPath:
        plugin: "dwb_core::DWBLocalPlanner"
        debug_trajectory_details: true

        # ✅ Omni(메카넘) 주행 세팅
        min_vel_x: -0.3
        max_vel_x: 0.3
        min_vel_y: -0.3
        max_vel_y: 0.3

        # ✅ 회전은 좌/우 허용 + 너무 느리게 막지 않기
        min_vel_theta: -0.6
        max_vel_theta: 0.6

        min_speed_xy: 0.0
        max_speed_xy: 0.26
        min_speed_theta: 0.0

        acc_lim_x: 1.0
        acc_lim_y: 1.0
        acc_lim_theta: 1.0
        decel_lim_x: -1.0
        decel_lim_y: -1.0
        decel_lim_theta: -1.0

        vx_samples: 15
        vy_samples: 10
        vtheta_samples: 10

        sim_time: 1.7
        linear_granularity: 0.05
        angular_granularity: 0.05
        transform_tolerance: 0.2

        xy_goal_tolerance: 0.25

        # ✅ 너무 큰 값(0.25) → 정지 판정 꼬임 방지
        trans_stopped_velocity: 0.05

        short_circuit_trajectory_evaluation: true
        limit_vel_cmd_in_traj: false
        stateful: true

        critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
        BaseObstacle.scale: 0.02
        PathAlign.scale: 32.0
        GoalAlign.scale: 12.0
        PathAlign.forward_point_distance: 0.1
        GoalAlign.forward_point_distance: 0.1
        PathDist.scale: 32.0
        GoalDist.scale: 24.0
        RotateToGoal.scale: 32.0
        RotateToGoal.slowing_factor: 5.0
        RotateToGoal.lookahead_time: -1.0

  # ===============================
  # Local Costmap
  # ===============================
  local_costmap:
    local_costmap:
      ros__parameters:
        use_sim_time: false

        global_frame: odom
        robot_base_frame: base_link
        rolling_window: true

        width: 3
        height: 3
        resolution: 0.05

        update_frequency: 5.0
        publish_frequency: 5.0
        transform_tolerance: 0.3

        footprint: "[[0.25, 0.2], [0.25, -0.2], [-0.25, -0.2], [-0.25, 0.2]]"

        plugins: ["obstacle_layer", "inflation_layer"]

        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          observation_sources: scan
          scan:
            topic: /scan
            max_obstacle_height: 2.0
            clearing: true
            marking: true
            data_type: "LaserScan"

        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.5
          cost_scaling_factor: 3.0

        always_send_full_costmap: true

  # ===============================
  # Global Costmap
  # ===============================
  global_costmap:
    global_costmap:
      ros__parameters:
        use_sim_time: false

        global_frame: map
        robot_base_frame: base_link
        resolution: 0.05

        update_frequency: 2.0
        publish_frequency: 2.0
        transform_tolerance: 0.3

        footprint: "[[0.25, 0.2], [0.25, -0.2], [-0.25, -0.2], [-0.25, 0.2]]"

        plugins: ["static_layer", "inflation_layer"]

        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: true

        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.6
          cost_scaling_factor: 3.0

        always_send_full_costmap: true

  # ===============================
  # Waypoint Follower
  # ===============================
  waypoint_follower:
    ros__parameters:
      use_sim_time: false
      loop_rate: 5
      stop_on_failure: false
      waypoint_task_executor_plugin: "wait_at_waypoint"
      wait_at_waypoint:
        plugin: "nav2_waypoint_follower::WaitAtWaypoint"
        enabled: true
        waypoint_pause_duration: 0

  # ===============================
  # Docking Server
  # ===============================
  docking_server:
    ros__parameters:
      use_sim_time: false
      controller_frequency: 50.0
      initial_perception_timeout: 5.0
      wait_charge_timeout: 5.0
      dock_approach_timeout: 30.0
      undock_linear_tolerance: 0.05
      undock_angular_tolerance: 0.1
      max_retries: 1
      base_frame: "base_link"
      fixed_frame: "odom"
      dock_backwards: false
      dock_prestaging_tolerance: 0.5

      # Required in Jazzy: at least one charging dock plugin definition
      dock_plugins: ["simple_charging_dock"]
      simple_charging_dock:
        plugin: "opennav_docking::SimpleChargingDock"
        docking_threshold: 0.05
        staging_x_offset: -0.7
        staging_yaw_offset: 3.14
        use_external_detection_pose: false
        use_battery_status: false
        use_stall_detection: false
        charger_on_threshold: 0.5
        charger_off_threshold: 0.3

  # ===============================
  # Velocity Smoother
  # ===============================
  velocity_smoother:
    ros__parameters:
      use_sim_time: false

      smoothing_frequency: 20.0
      scale_velocities: false
      feedback: "OPEN_LOOP"

      # ✅ Omni라서 Y축도 열기
      max_velocity: [0.5, 0.5, 2.5]
      min_velocity: [-0.5, -0.5, -2.5]

      deadband_velocity: [0.0, 0.0, 0.0]
      velocity_timeout: 1.0

      max_accel: [2.5, 2.5, 3.2]
      max_decel: [-2.5, -2.5, -3.2]

      odom_topic: /odom
      odom_duration: 0.1

      use_realtime_priority: false
      enable_stamped_cmd_vel: false
      stamp_smoothed_velocity_with_smoothing_time: false  # ONLY IN JAZZY

  # ===============================
  # Collision Monitor
  # ===============================
  collision_monitor:
    ros__parameters:
      use_sim_time: false
      enabled: false
      base_frame_id: "base_link"
      odom_frame_id: "odom"
      cmd_vel_in_topic: "cmd_vel_smoothed"
      cmd_vel_out_topic: "cmd_vel"
      transform_tolerance: 0.5
      source_timeout: 0.2
      base_shift_correction: true
      stop_pub_timeout: 1.0
      enable_stamped_cmd_vel: false
      use_realtime_priority: false
      polygons: ["PolygonStop"]
      PolygonStop:
        type: "circle"
        radius: 0.3
        action_type: "stop"
        min_points: 1
        visualize: false
        polygon_pub_topic: "polygon_stop"
        enabled: false
      observation_sources: ["scan"]
      scan:
        source_timeout: 0.2
        type: "scan"
        topic: "/scan"
        enabled: true
      # costmap:
      #   type: "costmap"   # relative, respects namespaces
      #   topic: "local_costmap/costmap"
      #   cost_threshold: 254
      #   enabled: True
      #   treat_unknown_as_obstacle: True
