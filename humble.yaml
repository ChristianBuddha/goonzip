amcl:
  ros__parameters:
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "robot1/base_footprint"
    odom_frame_id: "robot1/odom"
    global_frame_id: "map"

    # 업데이트 임계값(너가 0.01로 둔 거 유지)
    update_min_a: 0.00
    update_min_d: 0.00

    # Omni
    robot_model_type: "nav2_amcl::OmniMotionModel"

    # Laser
    scan_topic: /robot1/scan
    laser_model_type: "likelihood_field"
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    z_short: 0.05
    z_max: 0.05
    lambda_short: 0.1

    # Particles
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    random_seed: -1

    # TF
    # Note: Initial pose must be published in frame_id "map".
    tf_broadcast: true
    transform_tolerance: 1.0


bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: robot1/base_link
    odom_topic: /robot1/odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    default_cancel_timeout: 50
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

    bt_search_directories:
      - $(find-pkg-share nav2_bt_navigator)/behavior_trees


controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.30

    # 홀로노믹이면 y threshold 낮아야 함
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    path_handler_plugins: ["PathHandler"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      path_length_tolerance: 1.0

    PathHandler:
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 2.0
      enforce_path_inversion: false
      enforce_path_rotation: false
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      minimum_rotation_angle: 0.785
      reject_unit_path: false

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      time_steps: 56
      model_dt: 0.05
      batch_size: 2000

      # 가속/속도 제한
      ax_max: 3.0
      ax_min: -3.0
      ay_max: 3.0
      ay_min: -3.0
      az_max: 3.5

      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4

      vx_max: 0.5
      vx_min: -0.35
      vy_max: 0.5
      wz_max: 1.9

      iteration_count: 1
      temperature: 0.3
      gamma: 0.015

      # ✅ Humble에서도 Omni로
      motion_model: "Omni"

      visualize: true
      publish_optimal_trajectory: true
      regenerate_noises: true

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: true

      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic"
        ]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 1


local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: robot1/odom
      robot_base_frame: robot1/base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      # 40cm x 40cm
      footprint: "[ [0.20, 0.20], [0.20, -0.20], [-0.20, -0.20], [-0.20, 0.20] ]"
      footprint_padding: 0.02

      plugins: ["voxel_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /robot1/scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5


global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: robot1/base_link
      resolution: 0.05
      track_unknown_space: true

      footprint: "[ [0.20, 0.20], [0.20, -0.20], [-0.20, -0.20], [-0.20, 0.20] ]"
      footprint_padding: 0.02

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /robot1/scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.7


map_server:
  ros__parameters:
    yaml_filename: "/home/hs/trash/odom_revise_cap/my_map.yaml"


planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      # Humble: pluginlib class name uses "/" format
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true


behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: robot1/odom
    robot_base_frame: robot1/base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2


velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    max_velocity: [0.5, 0.5, 2.0]
    min_velocity: [-0.5, -0.5, -2.0]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]

    odom_topic: "/robot1/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


collision_monitor:
  ros__parameters:
    enabled: true
    base_frame_id: "robot1/base_footprint"
    odom_frame_id: "robot1/odom"
    cmd_vel_in_topic: "/robot1/cmd_vel_smoothed"
    cmd_vel_out_topic: "/robot1/cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: false
    stop_pub_timeout: 2.0

    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/robot1/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: true
